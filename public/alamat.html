<!DOCTYPE html>
<html lang="id">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Cari Alamat - Random Address Generator</title>
	<script src="https://cdn.tailwindcss.com"></script>
	<script src="https://unpkg.com/lucide@latest"></script>
	<style>
		@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');

		body {
			font-family: 'Plus Jakarta Sans', sans-serif;
		}

		.loader {
			border: 3px solid #f3f3f3;
			border-radius: 50%;
			border-top: 3px solid #3b82f6;
			width: 24px;
			height: 24px;
			animation: spin 1s linear infinite;
		}

		@keyframes spin {
			0% {
				transform: rotate(0deg);
			}

			100% {
				transform: rotate(360deg);
			}
		}
	</style>
</head>

<body class="bg-slate-50 min-h-screen text-slate-900">

	<!-- Header -->
	<header class="bg-white border-b border-slate-200 sticky top-0 z-20">
		<div class="max-w-6xl mx-auto px-4 h-20 flex items-center justify-between">
			<div class="flex items-center gap-2">
				<div class="bg-blue-600 p-2 rounded-lg text-white">
					<i data-lucide="map-pin" class="w-5 h-5"></i>
				</div>
				<h1 class="text-xl font-bold tracking-tight text-slate-800">Cari Alamat</h1>
			</div>
			<div id="statsInfo" class="hidden md:flex items-center gap-4 text-sm text-slate-500 font-medium">
				<span id="totalResults" class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-xs font-bold">0 Hasil</span>
			</div>
		</div>
	</header>

	<main class="max-w-6xl mx-auto px-4 py-6 md:py-10">
		<div class="grid grid-cols-1 lg:grid-cols-12 gap-8">

			<!-- Sidebar -->
			<div class="lg:col-span-4 space-y-6">
				<div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
					<h2 class="text-lg font-semibold mb-5 flex items-center gap-2 text-slate-700">
						<i data-lucide="settings-2" class="w-4 h-4"></i> Pengaturan
					</h2>

					<div class="space-y-5">
						<!-- Negara -->
						<div>
							<label for="countrySelect" class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Pilih Negara</label>
							<select id="countrySelect" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none transition-all cursor-pointer appearance-none">
                                <option value="" disabled selected>Memuat negara...</option>
                            </select>
						</div>

						<!-- Jumlah -->
						<div>
							<label for="quantityInput" class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Jumlah Data</label>
							<input type="number" id="quantityInput" min="1" max="50" value="8"
                                class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                        </div>

							<button id="generateBtn" disabled class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-slate-300 text-white font-bold py-4 px-6 rounded-xl transition-all flex items-center justify-center gap-2 shadow-lg shadow-blue-100 active:scale-[0.98]">
                            <span>Ambil Alamat</span>
                            <i data-lucide="map-pin" class="w-4 h-4"></i>
                        </button>
						</div>
					</div>

					<!-- Info Box -->
					<div class="bg-blue-50 p-6 rounded-2xl border border-blue-100">
						<p class="text-xs text-blue-600 leading-relaxed flex gap-2">
							<i data-lucide="info" class="w-5 h-5 shrink-0"></i>
							<span>Pilih negara dan tentukan jumlah data (1-50) untuk mendapatkan daftar alamat acak secara otomatis.</span>
						</p>
					</div>
				</div>

				<!-- Content Area -->
				<div class="lg:col-span-8">
					<!-- Welcome State -->
					<div id="welcomeState"
						class="bg-white border-2 border-dashed border-slate-200 rounded-3xl p-12 text-center">
						<i data-lucide="map" class="w-12 h-12 text-slate-300 mx-auto mb-4"></i>
						<h2 class="text-xl font-bold text-slate-800">Belum ada data</h2>
						<p class="text-slate-500 text-sm">Pilih negara dan klik tombol di samping untuk memulai
							pencarian.</p>
					</div>

					<!-- Loading State -->
					<div id="loadingState" class="hidden bg-white border border-slate-200 rounded-3xl p-12 text-center">
						<div class="loader mx-auto mb-4"></div>
						<p class="text-slate-600 font-medium text-sm">Sedang mengambil data...</p>
					</div>

					<!-- Results List -->
					<div id="resultsList" class="hidden space-y-4"></div>

					<!-- Error State -->
					<div id="errorState" class="hidden bg-red-50 border border-red-100 rounded-3xl p-8 text-center">
						<i data-lucide="alert-circle" class="w-10 h-10 text-red-500 mx-auto mb-4"></i>
						<p id="errorMsg" class="text-red-800 font-medium">Gagal mengambil data dari server.</p>
					</div>
				</div>
			</div>
	</main>

	<!-- Toast Notification -->
	<div id="toast"
		class="fixed bottom-6 left-1/2 -translate-x-1/2 translate-y-20 opacity-0 bg-slate-900 text-white px-6 py-3 rounded-xl shadow-2xl transition-all duration-300 flex items-center gap-3 z-50">
		<i data-lucide="check" class="w-4 h-4 text-green-400"></i>
		<span class="text-sm font-medium">Teks berhasil disalin!</span>
	</div>

	<script>
		const countrySelect = document.getElementById('countrySelect');
        const quantityInput = document.getElementById('quantityInput');
        const generateBtn = document.getElementById('generateBtn');
        const welcomeState = document.getElementById('welcomeState');
        const loadingState = document.getElementById('loadingState');
        const resultsList = document.getElementById('resultsList');
        const errorState = document.getElementById('errorState');
        const toast = document.getElementById('toast');

        lucide.createIcons();

        // Ambil daftar negara saat load
        async function fetchCountries() {
            try {
                const response = await fetch('https://shy-bush-a201.fauzanmuhraom.workers.dev/?list=negara');
                const result = await response.json();
                if (result.success) {
                    countrySelect.innerHTML = '<option value="" disabled selected>Pilih Negara...</option>';
                    result.data.forEach(c => {
                        const opt = document.createElement('option');
                        opt.value = c.value;
                        opt.textContent = c.name;
                        countrySelect.appendChild(opt);
                    });
                    generateBtn.disabled = false;
                    return true;
                }
            } catch (e) {
                showError("Gagal memuat daftar negara. Coba muat ulang halaman.");
                return false;
            }
        }

        // Ambil alamat acak
        async function fetchAddresses() {
            const countryCode = countrySelect.value;
            const qty = quantityInput.value || 8;
            
            if (!countryCode) return;

            const finalUrl = `https://shy-bush-a201.fauzanmuhraom.workers.dev/?${countryCode}=${qty}`;

            showLoading();

            try {
                const response = await fetch(finalUrl);
                const result = await response.json();

                if (result.success && result.data) {
                    renderCards(result.data);
                } else {
                    showError("Data tidak ditemukan untuk negara ini.");
                }
            } catch (e) {
                showError("Terjadi kesalahan koneksi ke server.");
            }
        }

        // Tampilkan hasil dalam bentuk kartu
        function renderCards(data) {
            hideAll();
            resultsList.innerHTML = '';
            resultsList.classList.remove('hidden');
            document.getElementById('statsInfo').classList.remove('hidden');
            document.getElementById('totalResults').textContent = `${data.length} Alamat`;

            data.forEach((item, i) => {
                const card = document.createElement('div');
                card.className = "bg-white p-6 rounded-2xl border border-slate-200 shadow-sm relative group hover:border-blue-200 transition-all";
                card.innerHTML = `
                    <button onclick="copyText('${item.street}, ${item.city}, ${item.zip_code}')" class="absolute top-4 right-4 p-2 bg-slate-50 rounded-lg text-slate-400 hover:text-blue-600 transition-all md:opacity-0 group-hover:opacity-100" title="Salin Alamat">
                        <i data-lucide="copy" class="w-4 h-4"></i>
                    </button>
                    <div class="flex items-start gap-4">
                        <div class="bg-blue-50 text-blue-600 px-3 py-1 rounded-md text-[10px] font-bold mt-1 shrink-0">${i+1}</div>
                        <div class="flex-1 pr-10">
                            <h3 class="text-sm font-bold text-slate-800 mb-1 break-words">${item.street}</h3>
                            <p class="text-xs text-slate-500 break-words">${item.city}</p>
                            <div class="mt-4 flex flex-wrap gap-x-6 gap-y-4 pt-4 border-t border-slate-50">
                                <div>
                                    <p class="text-[9px] uppercase font-bold text-slate-400">Kodepos</p>
                                    <p class="text-xs font-mono text-slate-700">${item.zip_code || '-'}</p>
                                </div>
                                <div>
                                    <p class="text-[9px] uppercase font-bold text-slate-400">Telepon</p>
                                    <p class="text-xs font-mono text-slate-700">${item.country_calling_code} ${item.phone_number}</p>
                                </div>
                                <div>
                                    <p class="text-[9px] uppercase font-bold text-slate-400">Wilayah</p>
                                    <p class="text-xs text-slate-700">${item.region || '-'}</p>
                                </div>
                                <div>
                                    <p class="text-[9px] uppercase font-bold text-slate-400">Negara</p>
                                    <p class="text-xs text-slate-700">${item.country}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                resultsList.appendChild(card);
            });
            lucide.createIcons();
        }

        function showLoading() { hideAll(); loadingState.classList.remove('hidden'); }
        function showError(m) { hideAll(); errorState.classList.remove('hidden'); document.getElementById('errorMsg').textContent = m; }
        function hideAll() { 
            [welcomeState, loadingState, resultsList, errorState].forEach(el => el.classList.add('hidden')); 
        }

        // Fungsi Salin
        function copyText(t) {
            const el = document.createElement('textarea');
            el.value = t;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 2000);
        }

        generateBtn.addEventListener('click', fetchAddresses);
        
        // Inisialisasi saat pertama kali buka
        window.onload = async () => {
            const success = await fetchCountries();
            if (success) {
                // Set default negara ke Indonesia (id)
                countrySelect.value = 'id';
                // Langsung load data (default quantity 8 sudah diatur di input value)
                fetchAddresses();
            }
        };
	</script>
</body>

</html>
