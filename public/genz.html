<!DOCTYPE html>
<html lang="id">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<title>Ruang Gen Z</title>

	<!-- Fonts: Plus Jakarta Sans -->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
		rel="stylesheet">

	<!-- Icons: Phosphor Icons -->
	<script src="https://unpkg.com/@phosphor-icons/web"></script>

	<!-- Tailwind CSS -->
	<script src="https://cdn.tailwindcss.com"></script>
	<script>
		tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        rz_black: '#000000',      /* Pitch black typical of Threads */
                        rz_gray: '#101010',       /* Very dark gray for subtle highlights */
                        rz_border: '#262626',     /* Subtle thin borders */
                        rz_text_secondary: '#777777',
                        rz_red: '#ff3040'
                    }
                }
            }
        }
	</script>

	<style>
		body {
			background-color: #000000;
			color: #f3f4f6;
			-webkit-tap-highlight-color: transparent;
		}

		::-webkit-scrollbar {
			width: 0px;
			background: transparent;
		}

		.thread-line {
			width: 2px;
			background-color: #333638;
			flex-grow: 1;
			margin-top: 8px;
			margin-bottom: 4px;
			border-radius: 999px;
		}

		.modal-overlay {
			background-color: rgba(0, 0, 0, 0.8);
			backdrop-filter: blur(5px);
		}

		.no-scrollbar {
			-ms-overflow-style: none;
			scrollbar-width: none;
		}

		/* Action Icon Animations */
		.action-icon {
			transition: transform 0.1s ease-in-out, color 0.2s;
		}

		.action-icon:active {
			transform: scale(0.8);
		}

		@keyframes slideUp {
			from {
				transform: translateY(100%);
				opacity: 0;
			}

			to {
				transform: translateY(0);
				opacity: 1;
			}
		}

		.toast-enter {
			animation: slideUp 0.3s ease-out forwards;
		}

		/* Bottom Sheet Animation */
		@keyframes slideUpSheet {
			from {
				transform: translateY(100%);
			}

			to {
				transform: translateY(0);
			}
		}

		.animate-slide-up {
			animation: slideUpSheet 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
		}

		textarea {
			resize: none;
		}

		/* Nav Tab Styling */
		.tab-active {
			color: white;
			border-bottom: 1.5px solid white;
		}

		.tab-inactive {
			color: #777777;
			border-bottom: 1.5px solid #262626;
		}
	</style>
</head>

<body class="antialiased overflow-y-scroll no-scrollbar selection:bg-gray-700 selection:text-white">

	<!-- App Shell -->
	<div class="flex justify-center min-h-screen">

		<!-- Left Sidebar (Desktop) -->
		<nav
			class="hidden sm:flex flex-col w-[68px] lg:w-[260px] h-screen sticky top-0 py-6 px-2 lg:px-6 shrink-0 z-40">
			<div class="flex items-center justify-center lg:justify-start mb-8 lg:px-2">
				<img src="https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/threads-white-icon.png" class="w-9 h-9" alt="Logo">
            </div>

				<div class="flex flex-col gap-1 w-full" id="desktop-nav">
					<!-- Nav items injected via JS based on auth state -->
				</div>
		</nav>

		<!-- Main Content Area -->
		<main
			class="w-full sm:w-[600px] min-h-screen border-x sm:border-rz_border border-transparent relative pb-20 sm:pb-0"
			id="main-content">

			<!-- Dynamic View Container -->
			<div id="view-container" class="min-h-screen">
				<!-- Content injected here -->
			</div>
		</main>

		<!-- Bottom Navigation (Mobile) -->
		<nav class="sm:hidden fixed bottom-0 left-0 right-0 bg-[#000000]/90 backdrop-blur-xl z-40" id="mobile-nav">
			<div class="flex justify-around items-center h-16 px-2" id="mobile-nav-items">
				<!-- Mobile nav items injected via JS -->
			</div>
		</nav>

	</div>

	<!-- Modals Container -->
	<div id="modals">
		<!-- Auth Modal -->
		<div id="auth-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay">
			<div
				class="bg-[#101010] border border-rz_border rounded-2xl w-full max-w-sm overflow-hidden shadow-2xl relative">
				<button onclick="app.closeModal('auth-modal')" class="absolute top-4 right-4 text-rz_text_secondary hover:text-white">
                    <i class="ph ph-x text-2xl"></i>
                </button>
				<div class="flex text-center mt-2 px-4">
					<button id="tab-login" class="flex-1 py-4 font-semibold text-[15px] tab-active" onclick="app.switchAuthTab('login')">Login</button>
					<button id="tab-register" class="flex-1 py-4 font-semibold text-[15px] tab-inactive" onclick="app.switchAuthTab('register')">Register</button>
				</div>

				<div class="p-6">
					<!-- Login Form -->
					<form id="form-login" onsubmit="app.handleLogin(event)" class="flex flex-col gap-3">
						<input type="email" id="login-email" placeholder="Email" required class="w-full bg-[#1a1a1a] border border-transparent rounded-xl px-4 py-3.5 text-[15px] text-white focus:outline-none focus:border-rz_border transition">
						<input type="password" id="login-password" placeholder="Password" required class="w-full bg-[#1a1a1a] border border-transparent rounded-xl px-4 py-3.5 text-[15px] text-white focus:outline-none focus:border-rz_border transition">
						<button type="submit" class="w-full bg-white text-black font-semibold rounded-xl py-3.5 mt-4 hover:bg-gray-200 transition text-[15px]" id="btn-login">Log in</button>
					</form>

					<!-- Register Form -->
					<form id="form-register" onsubmit="app.handleRegister(event)" class="hidden flex flex-col gap-3">
						<input type="text" id="reg-username" placeholder="Username" required minlength="3" class="w-full bg-[#1a1a1a] border border-transparent rounded-xl px-4 py-3.5 text-[15px] text-white focus:outline-none focus:border-rz_border transition">
						<input type="email" id="reg-email" placeholder="Email" required class="w-full bg-[#1a1a1a] border border-transparent rounded-xl px-4 py-3.5 text-[15px] text-white focus:outline-none focus:border-rz_border transition">
						<input type="password" id="reg-password" placeholder="Password" required minlength="6" class="w-full bg-[#1a1a1a] border border-transparent rounded-xl px-4 py-3.5 text-[15px] text-white focus:outline-none focus:border-rz_border transition">
						<button type="submit" class="w-full bg-white text-black font-semibold rounded-xl py-3.5 mt-4 hover:bg-gray-200 transition text-[15px]" id="btn-register">Sign up</button>
					</form>
				</div>
			</div>
		</div>

		<!-- Custom Confirm Modal -->
		<div id="confirm-modal" class="hidden fixed inset-0 z-[60] flex items-center justify-center p-4 modal-overlay">
			<div
				class="bg-[#181818] border border-rz_border rounded-2xl w-full max-w-[320px] overflow-hidden shadow-2xl p-6 text-center">
				<h3 class="text-[18px] font-bold text-white mb-2" id="confirm-title">Konfirmasi</h3>
				<p class="text-rz_text_secondary text-[15px] mb-6" id="confirm-message">Apakah Anda yakin?</p>
				<div class="flex gap-3">

				</div>
			</div>
		</div>

		<!-- Composer Modal (Create/Edit Post) - Now Responsive Bottom Sheet -->
		<div id="composer-modal"
			class="hidden fixed inset-0 z-50 flex flex-col justify-end sm:justify-center sm:items-center p-0 sm:p-4 modal-overlay"
			onclick="if(event.target === this) app.closeModal('composer-modal')">
			<div
				class="bg-[#101010] border-t sm:border border-rz_border rounded-t-[24px] sm:rounded-2xl w-full h-auto max-h-[90vh] sm:max-h-[90vh] max-w-xl overflow-y-visible shadow-2xl relative flex flex-col animate-slide-up sm:animate-none pb-4 sm:pb-0">

				<!-- Handle Bar for Mobile -->
				<div class="w-full flex justify-center pt-3 pb-1 sm:hidden cursor-pointer"
					onclick="app.closeModal('composer-modal')">
					<div class="w-12 h-1.5 bg-[#333638] rounded-full"></div>
				</div>

				<div
					class="flex justify-between items-center px-4 py-3 border-b border-rz_border sticky top-0 bg-[#101010]/90 backdrop-blur z-10 rounded-t-[24px] sm:rounded-t-2xl">
					<button onclick="app.closeModal('composer-modal')" class="text-white text-[15px] hidden sm:block hover:opacity-70">Batal</button>
					<div class="sm:hidden w-[50px]"></div> <!-- Spacer to center title on mobile -->

					<button onclick="app.submitPost()" id="btn-submit-post" class="text-white font-semibold opacity-50 cursor-not-allowed text-[15px] w-[50px] text-right hover:opacity-70 transition">Post</button>
				</div>

				<div class="p-4 flex gap-3 flex-1 overflow-y-auto no-scrollbar">
					<div class="flex flex-col items-center shrink-0">
						<img id="composer-avatar" src="https://ui-avatars.com/api/?name=User&background=333&color=fff" class="w-9 h-9 rounded-full object-cover">
						<div class="thread-line"></div>
						<img id="composer-avatar-small" src="https://ui-avatars.com/api/?name=User&background=333&color=fff" class="w-4 h-4 rounded-full object-cover opacity-50 mt-1">
                    </div>
						<div class="flex-1 relative">
							<p class="font-semibold text-[15px] mb-1" id="composer-username">Username</p>
							<input type="hidden" id="composer-post-id">

							<input type="text" id="post-title" placeholder="Title (optional)" class="w-full bg-transparent text-white font-semibold outline-none placeholder-rz_text_secondary mb-2 text-[15px]">

							<div class="relative w-full">
								<textarea id="post-content" placeholder="Start a thread... (ketik @ untuk mention)" class="w-full bg-transparent text-white outline-none placeholder-rz_text_secondary min-h-[80px] text-[15px] leading-relaxed" oninput="app.checkComposerState(); app.handleMentionSearch(this, 'composer')" onblur="setTimeout(() => { const el = document.getElementById('composer-mention-list'); if(el) el.classList.add('hidden'); }, 200)"></textarea>

								<!-- Autocomplete Suggestions -->

								</div>
							</div>

							<div id="image-preview-container" class="hidden relative mt-2 w-fit mb-2">
								<img id="image-preview" src="" class="max-h-[300px] rounded-xl border border-rz_border object-cover">
								<button onclick="app.removeImage()" class="absolute top-2 right-2 bg-black/70 rounded-full p-1.5 text-white hover:bg-black transition">
                                <i class="ph ph-x"></i>
                            </button>
								<input type="hidden" id="post-image-url">
                        </div>

								<div class="mt-2 flex gap-4 items-center">

                            </label>
									<select id="post-category" class="bg-transparent text-rz_text_secondary text-[14px] outline-none cursor-pointer">

							</div>

							class="px-4 py-4 border-t border-rz_border flex items-center justify-between text-rz_text_secondary">

							<label class="flex items-center gap-2 text-[14px] cursor-pointer">

                    </label>
						</div>
					</div>
				</div>

				<!-- Edit Profile Modal -->
				<div id="profile-modal"
					class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay">
					<div
						class="bg-[#101010] border border-rz_border rounded-2xl w-full max-w-sm overflow-hidden shadow-2xl relative">
						<div class="flex justify-between items-center px-4 py-3 border-b border-rz_border">
							<h2 class="font-bold text-[16px]">Edit profile</h2>
							<button onclick="app.closeModal('profile-modal')" class="text-rz_text_secondary hover:text-white transition"><i class="ph ph-x text-xl"></i></button>
						</div>
						<div class="p-6 flex flex-col gap-4">
							<div
								class="flex justify-between items-center p-4 bg-[#1a1a1a] rounded-xl border border-rz_border/50">
								<div>
									<p class="font-bold text-[15px]" id="edit-preview-name">Name</p>
									<p class="text-[14px]" id="edit-preview-user">@username</p>
								</div>
								<div class="relative group cursor-pointer shrink-0"
									onclick="document.getElementById('avatar-upload').click()">
									<img id="edit-avatar-preview" src="" class="w-14 h-14 rounded-full object-cover">

                    </div>
										<div>
											<label class="text-[13px] font-semibold">Bio</label>
											<textarea id="edit-bio" rows="2" placeholder="+ Write bio" class="w-full bg-transparent border-b border-rz_border py-2 text-[15px] text-white focus:outline-none focus:border-white transition resize-none"></textarea>

										<button onclick="app.saveProfile()" id="btn-save-profile" class="w-full bg-white text-black font-semibold rounded-xl py-3 mt-4 hover:bg-gray-200 transition text-[15px]">Done</button>
									</div>

							</div>

							<!-- Post Detail Modal -->
							<div id="detail-modal"
								class="hidden fixed inset-0 z-40 flex items-start sm:items-center justify-center p-0 sm:p-4 modal-overlay">
								<div
									class="bg-[#000000] sm:bg-[#101010] sm:border border-rz_border rounded-none sm:rounded-2xl w-full h-full sm:h-[90vh] max-w-2xl overflow-hidden shadow-2xl relative flex flex-col">
									<div
										class="flex items-center px-4 h-[64px] border-b border-rz_border sticky top-0 bg-[#000000]/90 sm:bg-[#101010]/90 backdrop-blur z-10 justify-between">
										<button onclick="app.closeModal('detail-modal')" class="text-white w-[32px] flex justify-start hover:opacity-70 transition"><i class="ph ph-arrow-left text-2xl"></i></button>
										<img src="https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/threads-white-icon.png" class="w-[32px] h-[32px]" alt="Logo">

									<div class="flex-1 overflow-y-auto no-scrollbar pb-24" id="detail-content">
										<!-- Post and Comments injected here -->
									</div>
									<!-- Comment Input Area -->
									<div class="absolute bottom-0 left-0 right-0 p-4 bg-[#000000] sm:bg-[#101010] border-t border-rz_border flex gap-3 items-center"

								</div>
							</div>

							<!-- Follow/Following Modal -->
							<div id="follow-modal"
								class="hidden fixed inset-0 z-50 flex flex-col justify-end sm:justify-center sm:items-center p-0 sm:p-4 modal-overlay"
								onclick="if(event.target === this) app.closeModal('follow-modal')">
								<div
									class="bg-[#101010] border-t sm:border border-rz_border rounded-t-[24px] sm:rounded-2xl w-full h-auto max-h-[80vh] sm:max-h-[80vh] max-w-md overflow-hidden shadow-2xl relative flex flex-col animate-slide-up sm:animate-none">

									<!-- Handle Bar for Mobile -->
									<div class="w-full flex justify-center pt-3 pb-1 sm:hidden cursor-pointer"
										onclick="app.closeModal('follow-modal')">
										<div class="w-12 h-1.5 bg-[#333638] rounded-full"></div>
									</div>

									<div
										class="flex justify-between items-center px-4 py-3 border-b border-rz_border sticky top-0 bg-[#101010]/90 backdrop-blur z-10 rounded-t-[24px] sm:rounded-t-2xl">
										<h2 class="font-bold text-[16px] text-center w-full" id="follow-modal-title">
											Followers</h2>
										<button onclick="app.closeModal('follow-modal')" class="absolute right-4 text-rz_text_secondary hover:text-white hidden sm:block transition"><i class="ph ph-x text-xl"></i></button>
									</div>
									<div class="flex-1 overflow-y-auto no-scrollbar pb-4" id="follow-modal-content">

									</div>
								</div>
							</div>

							<!-- Settings Menu Modal (Burger) -->
							<div id="settings-modal"
								class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay"
								onclick="if(event.target === this) app.closeModal('settings-modal')">

									class="bg-[#181818] border border-rz_border rounded-[18px] w-full max-w-[300px] overflow-hidden shadow-2xl relative flex flex-col">
									<div class="flex flex-col text-[15px] font-semibold">
										<button class="text-left px-5 py-4 hover:bg-[#262626] transition flex justify-between items-center text-white">Tampilan <i class="ph ph-caret-right text-rz_text_secondary"></i></button>

										<button class="text-left px-5 py-4 hover:bg-[#262626] transition text-white text-center text-rz_red" onclick="app.logout(); app.closeModal('settings-modal')">Log out</button>
									</div>
								</div>
							</div>

						</div>

						<!-- Toast Container -->
						<div id="toast-container"
							class="fixed bottom-24 sm:bottom-10 left-1/2 transform -translate-x-1/2 z-[100] flex flex-col gap-2 pointer-events-none w-full max-w-sm px-4">
						</div>

						<!-- MAIN SCRIPT -->
						<script>
							const API_URL = "https://apigenz.rizkifundie.workers.dev";
        
        // --- STATE MANAGEMENT ---
        const app = {
            user: null,
            token: localStorage.getItem('token') || null,
            categories: [],
            currentView: 'home',
            currentParams: null,
            isLiking: {}, 
            isReposting: {},
            isSaving: {},
            isFollowing: {},
            currentDetailPostId: null,

            // Configs for Navigation
            navItems: [
                { id: 'home', icon: 'ph-house', label: 'Home' },
                { id: 'search', icon: 'ph-magnifying-glass', label: 'Search' },
                { id: 'create', icon: 'ph-plus', label: 'Post', action: 'openComposer' },
                { id: 'activity', icon: 'ph-heart', label: 'Activity', reqAuth: true },
                { id: 'profile', icon: 'ph-user', label: 'Profile', reqAuth: true },
            ]
        };

        // --- UTILS ---
        
        const util = {
            formatDate: (dateString) => {
                if (!dateString) return '';
                const date = new Date(dateString.replace(' ', 'T') + '+07:00');
                const now = new Date();
                const diffSec = Math.floor((now - date) / 1000);
                
                if (diffSec < 60) return 'Baru saja';
                if (diffSec < 3600) return `${Math.floor(diffSec/60)}m`;
                if (diffSec < 86400) return `${Math.floor(diffSec/3600)}j`;
                if (diffSec < 604800) return `${Math.floor(diffSec/86400)}h`;
                
                const options = { day: '2-digit', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Jakarta' };
                return date.toLocaleDateString('id-ID', options).replace(' pukul ', ', ').replace(':', '.');
            },
            
            escapeHTML: (str) => {
                if (!str) return '';
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            },

            formatContent: (text) => {
                if (!text) return '';
                let escaped = util.escapeHTML(text).replace(/\n/g, '<br>');
                // Mengubah pola @username menjadi link profil yang aman dan bold
                escaped = escaped.replace(/@([a-zA-Z0-9_.]{3,30})/g, function(match, username) {
                    const clean = username.toLowerCase();
                    // Gunakan event.stopPropagation() agar klik mention di feed tidak membuka detail post
                    return `<button type="button" onclick="event.stopPropagation(); app.closeModal('detail-modal'); app.navigate('profile', '${clean}')" class="font-semibold text-white hover:underline">${match}</button>`;
                });
                return escaped;
            },

            showToast: (msg, type = 'info') => {
                const container = document.getElementById('toast-container');
                const toast = document.createElement('div');
                toast.className = `toast-enter px-4 py-3.5 rounded-xl shadow-lg text-[15px] font-medium flex items-center gap-2 ${type === 'error' ? 'bg-red-950 text-red-100 border border-red-900' : 'bg-white text-black'}`;
                
                const icon = type === 'error' ? 'ph-warning-circle' : (type === 'success' ? 'ph-check-circle' : 'ph-info');
                toast.innerHTML = `<i class="ph ${icon} text-xl"></i> <span>${msg}</span>`;
                
                container.appendChild(toast);
                setTimeout(() => {
                    toast.style.opacity = '0';
                    toast.style.transform = 'translateY(100%)';
                    toast.style.transition = 'all 0.3s ease';
                    setTimeout(() => toast.remove(), 300);
                }, 3000);
            },

            getAvatar: (url, name) => {
                return url || `https://ui-avatars.com/api/?name=${encodeURIComponent(name || 'A')}&background=1a1a1a&color=fff&rounded=true`;
            },

            setLoading: (elementId, isLoading, originalText = '') => {
                const el = document.getElementById(elementId);
                if (!el) return;
                if (isLoading) {
                    el.disabled = true;
                    el.dataset.ot = el.innerHTML;
                    el.innerHTML = `<i class="ph ph-spinner animate-spin text-xl mx-auto"></i>`;
                    el.classList.add('opacity-50', 'cursor-not-allowed');
                } else {
                    el.disabled = false;
                    el.innerHTML = el.dataset.ot || originalText;
                    el.classList.remove('opacity-50', 'cursor-not-allowed');
                }
            }
        };

        // --- API WRAPPER ---
        async function api(endpoint, options = {}) {
            const headers = {};
            if (app.token) headers['Authorization'] = `Bearer ${app.token}`;
            
            if (options.body && !(options.body instanceof FormData)) {
                headers['Content-Type'] = 'application/json';
                if (typeof options.body === 'object') {
                    options.body = JSON.stringify(options.body);
                }
            }

            try {
                const res = await fetch(`${API_URL}${endpoint}`, { ...options, headers });
                
                let data;
                try {
                    data = await res.json();
                } catch (parseErr) {
                    throw new Error(`Respons API tidak valid (Status HTTP: ${res.status}). Pastikan endpoint ada dan mengembalikan JSON.`);
                }
                
                if (!res.ok || data.success === false) {
                    if (res.status === 401) {
                        app.logout(false);
                    }
                    throw new Error(data.message || `Error dari server (Status: ${res.status})`);
                }
                return data;
            } catch (err) {
                console.error(`[API Error] ${endpoint}:`, err.message);
                throw err;
            }
        }

            const btnOk = document.getElementById('confirm-ok');
            const btnCancel = document.getElementById('confirm-cancel');

            // Clone to remove previous event listeners
            const newBtnOk = btnOk.cloneNode(true);
            const newBtnCancel = btnCancel.cloneNode(true);
            btnOk.parentNode.replaceChild(newBtnOk, btnOk);
            btnCancel.parentNode.replaceChild(newBtnCancel, btnCancel);

            const cleanup = () => modal.classList.add('hidden');

            newBtnOk.addEventListener('click', () => { cleanup(); onConfirm(); });
            newBtnCancel.addEventListener('click', () => { cleanup(); });

        let mentionSearchTimeout;

        app.handleMentionSearch = (inputEl, context) => {
            clearTimeout(mentionSearchTimeout);
            const val = inputEl.value;
            const cursorPos = inputEl.selectionStart;
            
            // Mencari pola @ yang belum selesai di-ketik (mengambil dari kursor mundur ke belakang)
            const textBeforeCursor = val.substring(0, cursorPos);
            const match = textBeforeCursor.match(/@([a-zA-Z0-9_.]{1,30})$/);
            
            const listId = context === 'composer' ? 'composer-mention-list' : 'comment-mention-list';
            const listEl = document.getElementById(listId);

            if (match) {
                const query = match[1];
                if (query.length >= 1) {
                    mentionSearchTimeout = setTimeout(async () => {
                        try {
                            const res = await api(`/api/search/users?q=${encodeURIComponent(query)}`);
                            if (res.data && res.data.length > 0) {
                                let html = '';
                                res.data.slice(0, 5).forEach(u => { // Batasi 5 hasil saja
                                    html += `
                                        <div class="px-4 py-2.5 hover:bg-[#262626] cursor-pointer flex items-center gap-3 transition" 
                                             onmousedown="app.insertMention('${u.username}', '${context}'); event.preventDefault();">

                                                <span class="text-rz_text_secondary text-[13px] leading-tight">@${u.username}</span>
                                            </div>
                                        </div>
                                    `;
                                });
                                listEl.innerHTML = html;
                                listEl.classList.remove('hidden');
                            } else {
                                listEl.classList.add('hidden');
                            }
                        } catch(e) {}
                    }, 300); // debounce
                } else {
                    listEl.classList.add('hidden');
                }
            } else {
                listEl.classList.add('hidden');
            }
        };

        app.insertMention = (username, context) => {
            const inputId = context === 'composer' ? 'post-content' : 'comment-input';
            const inputEl = document.getElementById(inputId);
            const val = inputEl.value;
            const cursorPos = inputEl.selectionStart;
            
            // Mencari indeks '@' terakhir sebelum kursor
            const textBeforeCursor = val.substring(0, cursorPos);
            const match = textBeforeCursor.match(/@[a-zA-Z0-9_.]+$/);
            
            if (match) {
                const startIdx = match.index;
                const textAfterCursor = val.substring(cursorPos);
                
                // Menggabungkan bagian sebelum '@', masukkan mention baru, dan sambung dengan sisa teks
                const newValue = val.substring(0, startIdx) + '@' + username + ' ' + textAfterCursor;
                inputEl.value = newValue;
                
                // Menyesuaikan posisi kursor setelah spasi
                const newCursorPos = startIdx + username.length + 2; 
                inputEl.focus();
                inputEl.setSelectionRange(newCursorPos, newCursorPos);
            }
            
            const listId = context === 'composer' ? 'composer-mention-list' : 'comment-mention-list';
            document.getElementById(listId).classList.add('hidden');

        app.toggleLike = async (id) => {
            if (!app.user) return app.openAuthModal();
            if (app.isLiking[id]) return;
            
            app.isLiking[id] = true;
            const btn = document.querySelector(`.like-btn[data-id="${id}"]`);
            const icon = btn.querySelector('.like-icon');
            const postEl = document.getElementById(`post-${id}`);
            const countSpan = postEl ? postEl.querySelector('.like-count') : null;
            
            // Optimistic UI update
            const isCurrentlyLiked = icon.classList.contains('ph-fill');
            const currentCount = countSpan ? parseInt(countSpan.textContent || '0') : 0;
            
            if (isCurrentlyLiked) {
                 icon.className = 'ph ph-heart text-white text-[22px] like-icon';
                 if(countSpan) countSpan.textContent = currentCount > 1 ? currentCount - 1 : '';
            } else {
                 icon.className = 'ph-fill ph-heart text-rz_red text-[22px] like-icon';
                 if(countSpan) countSpan.textContent = currentCount + 1;
            }

            try {
                const method = app.currentView === 'likes' ? 'DELETE' : 'POST';
                const endpoint = `/api/posts/${id}/like`;

                const res = await api(endpoint, { method });
                
                // Confirm UI
                if (res.liked || res.liked_by_me === 1) {
                    icon.className = 'ph-fill ph-heart text-rz_red text-[22px] like-icon';
                } else {
                    icon.className = 'ph ph-heart text-white hover:text-rz_text_secondary text-[22px] like-icon';
                    if (app.currentView === 'likes' || app.currentParams === 'likes') {
                        if(postEl) postEl.style.display = 'none';
                    }
                }
                if(countSpan) countSpan.textContent = res.total_likes > 0 ? res.total_likes : '';
                
            } catch (err) {
                // Revert optimistic on fail
                if (isCurrentlyLiked) {
                    icon.className = 'ph-fill ph-heart text-rz_red text-[22px] like-icon';
                    if(countSpan) countSpan.textContent = currentCount > 0 ? currentCount : '';
                } else {
                    icon.className = 'ph ph-heart text-white text-[22px] like-icon';
                    if(countSpan) countSpan.textContent = currentCount > 0 ? currentCount : '';
                }
                util.showToast(err.message, 'error');
            } finally {
                app.isLiking[id] = false;
            }
        };

                    if(btn) {
                        btn.textContent = 'Follow';
                        btn.className = 'w-full bg-white text-black font-semibold py-1.5 rounded-xl text-[15px] hover:bg-gray-200 transition';
                    }
                }
                
                if (countSpan && res.total_followers !== undefined) {
                    countSpan.textContent = res.total_followers;
                }
                
                util.showToast(res.message);

            } catch (err) {
                util.showToast(err.message, 'error');
            } finally {
                if(btn) btn.classList.remove('opacity-50', 'cursor-not-allowed');
                app.isFollowing[username] = false;
            }
        };

        app.openFollowModal = async (type, username) => {
            document.getElementById('follow-modal').classList.remove('hidden');
            document.getElementById('follow-modal-title').textContent = type === 'followers' ? 'Followers' : 'Following';
            const content = document.getElementById('follow-modal-content');
            content.innerHTML = `<div class="p-10 text-center"><i class="ph ph-spinner animate-spin text-2xl text-rz_text_secondary"></i></div>`;

            try {
                const res = await api(`/api/users/${username}/${type}`);
                if (!res.data || res.data.length === 0) {
                    content.innerHTML = app.renderEmpty(type === 'followers' ? 'Belum ada followers.' : 'Belum mengikuti siapa pun.');
                } else {
                    let html = '';
                    res.data.forEach(u => {
                        html += app.createUserHTML(u);
                    });
                    content.innerHTML = html;
                }
            } catch (err) {
                content.innerHTML = app.renderEmpty('Gagal memuat data.');
            }
        };

        app.copyLink = (id) => {
            const url = `${window.location.origin}/#post-${id}`;
            navigator.clipboard.writeText(url).then(() => {
                util.showToast('Tautan disalin', 'success');
            }).catch(() => {
                const input = document.createElement('input');
                input.value = url;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                util.showToast('Tautan disalin', 'success');
            });
        };

        // --- DETAIL & COMMENTS ---

        app.openDetail = async (id) => {
            app.currentDetailPostId = id;
            document.getElementById('detail-modal').classList.remove('hidden');
            const content = document.getElementById('detail-content');
            const inputArea = document.getElementById('comment-input-area');

            // Render Input Area secara Dinamis berdasarkan Auth State
            if (app.user) {
                inputArea.innerHTML = `
                    <img id="comment-my-avatar" src="${util.getAvatar(app.user.avatar_url, app.user.display_name)}" class="w-9 h-9 rounded-full object-cover shrink-0">
                    <div class="relative flex-1">
                        <input type="text" id="comment-input" placeholder="Tulis reply... (ketik @ untuk mention)" class="w-full bg-[#1a1a1a] rounded-full px-4 py-2.5 text-[15px] text-white focus:outline-none" oninput="app.handleMentionSearch(this, 'comment')" onblur="setTimeout(() => { const el = document.getElementById('comment-mention-list'); if(el) el.classList.add('hidden'); }, 200)">
                        
                        <!-- Autocomplete Suggestions for Comments -->
                        <div id="comment-mention-list" class="hidden absolute bottom-full left-0 mb-2 bg-[#1a1a1a] border border-rz_border rounded-xl shadow-2xl max-h-48 overflow-y-auto z-50 w-full sm:w-[250px]"></div>
                    </div>
                    <button onclick="app.submitComment()" class="text-white font-semibold disabled:opacity-50 px-2 py-1 bg-transparent rounded-full hover:opacity-70 transition"><i class="ph-fill ph-arrow-circle-up text-[30px]"></i></button>
                `;
            } else {
                inputArea.innerHTML = `
                    <div class="w-full text-center py-2">
                        <button onclick="app.closeModal('detail-modal'); app.openAuthModal()" class="text-blue-500 font-semibold text-[15px] hover:underline transition">Login untuk membalas thread ini.</button>
                    </div>
                `;
            }

            content.innerHTML = `<div class="p-10 text-center"><i class="ph ph-spinner animate-spin text-2xl text-rz_text_secondary"></i></div>`;
            
            try {
                let post = (app.postsData || []).find(p => p.id === id);
                if (!post) {
                     content.innerHTML = app.renderEmpty('Postingan tidak ditemukan di sesi ini.');
                     return;
                }

                let html = app.createPostHTML(post, true);
                html += `<div class="border-t border-rz_border mt-2" id="comments-container">
                            <div class="p-4 text-center"><i class="ph ph-spinner animate-spin"></i> Memuat replies...</div>
                         </div>`;
                content.innerHTML = html;

                const resCom = await api(`/api/posts/${id}/comments`);
                const comContainer = document.getElementById('comments-container');
                if (!resCom.data || resCom.data.length === 0) {
                    comContainer.innerHTML = `<div class="p-6 text-center text-rz_text_secondary text-[15px]">Belum ada replies. Jadi yang pertama membalas.</div>`;
                } else {
                    let chtml = '';
                    resCom.data.forEach(c => { chtml += app.createCommentHTML(c); });
                    comContainer.innerHTML = chtml;
                }

            } catch (err) {
                content.innerHTML = app.renderEmpty('Gagal memuat replies. Coba lagi.');
            }
        };

        app.submitComment = async () => {
            if (!app.user) return app.openAuthModal();
            const id = app.currentDetailPostId;
            const input = document.getElementById('comment-input');
            const val = input.value.trim();
            if (!val) return;

            const btn = input.nextElementSibling; // the submit button
            if(btn) btn.disabled = true;
            input.disabled = true;

            try {
                await api(`/api/posts/${id}/comments`, {
                    method: 'POST',
                    body: { content: val }
                });
                input.value = '';
                util.showToast('Reply berhasil dikirim.', 'success');
                
                // Refresh hitungan komentar di tampilan feed secara langsung (DOM Update)
                const postEl = document.getElementById(`post-${id}`);
                if (postEl) {
                    const countEls = postEl.querySelectorAll('.comment-count');
                    countEls.forEach(el => {
                        el.textContent = parseInt(el.textContent || '0') + 1;
                    });
                }

                // Perbarui data post di cache state kita
                const postCache = (app.postsData || []).find(p => p.id === id);
                if(postCache) postCache.total_comments++;

                // Load ulang data replies di Modal Detail
                app.openDetail(id);
            } catch (err) {
                util.showToast(err.message, 'error');
            } finally {
                if(btn) btn.disabled = false;
                input.disabled = false;
            }
        };

        // --- COMPOSER ---

        let composerImageFile = null;

        app.openComposer = () => {
            if (!app.user) return app.openAuthModal();
            document.getElementById('composer-modal').classList.remove('hidden');
            document.getElementById('composer-title').textContent = 'New thread';
            document.getElementById('composer-post-id').value = '';
            document.getElementById('post-title').value = '';
            document.getElementById('post-content').value = '';
            document.getElementById('post-category').value = '';
            document.getElementById('post-anonymous').checked = false;
            app.removeImage();
            app.checkComposerState();
        };

        app.openEditPost = (id) => {
            if (!app.user) return;
            const post = app.postsData.find(p => p.id === id);
            if (!post) return;

            document.getElementById('composer-modal').classList.remove('hidden');
            document.getElementById('composer-title').textContent = 'Edit thread';
            document.getElementById('composer-post-id').value = id;
            document.getElementById('post-title').value = post.title || '';
            document.getElementById('post-content').value = post.content || '';
            document.getElementById('post-category').value = post.category_id || '';
            document.getElementById('post-anonymous').checked = post.is_anonymous == 1;
            
            app.removeImage();
            if (post.image_url) {
                document.getElementById('post-image-url').value = post.image_url;
                document.getElementById('image-preview').src = post.image_url;
                document.getElementById('image-preview-container').classList.remove('hidden');
            }

            app.checkComposerState();
        };

        app.checkComposerState = () => {
            const content = document.getElementById('post-content').value.trim();
            const btn = document.getElementById('btn-submit-post');
            
            const ta = document.getElementById('post-content');
            ta.style.height = 'auto';
            ta.style.height = (ta.scrollHeight) + 'px';

            if (content.length > 0) {
                btn.classList.remove('opacity-50', 'cursor-not-allowed', 'text-rz_text_secondary');
                btn.classList.add('text-blue-500', 'font-bold');
            } else {
                btn.classList.add('opacity-50', 'cursor-not-allowed');
                btn.classList.remove('text-blue-500', 'font-bold');
            }
        };

        app.handleImageSelect = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            if (!file.type.startsWith('image/')) {
                return util.showToast('Select valid image', 'error');
            }
            if (file.size > 32 * 1024 * 1024) {
                return util.showToast('Max size 32MB', 'error');
            }

            composerImageFile = file;
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('image-preview').src = e.target.result;
                document.getElementById('image-preview-container').classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        };

        app.removeImage = () => {
            composerImageFile = null;
            document.getElementById('post-image').value = '';
            document.getElementById('post-image-url').value = '';
            document.getElementById('image-preview-container').classList.add('hidden');
        };

        app.submitPost = async () => {
            const content = document.getElementById('post-content').value.trim();
            if (!content) return;

            util.setLoading('btn-submit-post', true);

            try {
                let imageUrl = document.getElementById('post-image-url').value;

                if (composerImageFile) {
                    const fd = new FormData();
                    fd.append('image', composerImageFile);
                    const resImg = await api('/api/upload', { method: 'POST', body: fd });
                    imageUrl = resImg.url;
                }

                const payload = {
                    title: document.getElementById('post-title').value.trim(),
                    content: content,
                    category_id: document.getElementById('post-category').value,
                    image_url: imageUrl,
                    is_anonymous: document.getElementById('post-anonymous').checked
                };

                const postId = document.getElementById('composer-post-id').value;
                const method = postId ? 'PUT' : 'POST';
                const endpoint = postId ? `/api/posts/${postId}` : `/api/posts`;

                await api(endpoint, { method, body: payload });
                
                util.showToast(postId ? 'Updated' : 'Posted', 'success');
                app.closeModal('composer-modal');
                if (app.currentView === 'home' || (app.currentView === 'profile' && !app.currentParams)) {
                    app.navigate(app.currentView, app.currentParams);
                }
            } catch (err) {
                util.showToast(err.message, 'error');
            } finally {
                util.setLoading('btn-submit-post', false, 'Post');
            }
        };

        app.deletePost = (id) => {
            app.confirm('Hapus Thread', 'Apakah Anda yakin ingin menghapus thread ini?', async () => {
                try {
                    await api(`/api/posts/${id}`, { method: 'DELETE' });
                    const postEl = document.getElementById(`post-${id}`);
                    if(postEl) postEl.remove();
                    util.showToast('Thread dihapus');
                    // Jika dihapus dari dalam modal detail, tutup modalnya
                    if(app.currentDetailPostId === id) {
                        app.closeModal('detail-modal');
                    }
                } catch (err) {
                    util.showToast(err.message, 'error');
                }
            });
        };

        // --- PROFILE EDIT ---

        app.openEditProfile = () => {
            if (!app.user) return;
            document.getElementById('profile-modal').classList.remove('hidden');
            document.getElementById('edit-username').value = app.user.username;
            document.getElementById('edit-display-name').value = app.user.display_name;
            document.getElementById('edit-bio').value = app.user.bio || '';
            document.getElementById('edit-preview-name').textContent = app.user.display_name;
            document.getElementById('edit-preview-user').textContent = '@' + app.user.username;
            document.getElementById('edit-avatar-preview').src = util.getAvatar(app.user.avatar_url, app.user.display_name);
        };

        app.handleAvatarUpload = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            if (!file.type.startsWith('image/')) return util.showToast('Select valid image', 'error');

            const fd = new FormData();
            fd.append('image', file);
            
            const prevSrc = document.getElementById('edit-avatar-preview').src;
            document.getElementById('edit-avatar-preview').src = 'https://i.gifer.com/ZKZg.gif'; 

            try {
                const res = await api('/api/profile/avatar', { method: 'POST', body: fd });
                app.user = res.user;
                document.getElementById('edit-avatar-preview').src = res.url;
                util.showToast('Profile photo updated', 'success');
                app.renderNav(); 
            } catch (err) {
                document.getElementById('edit-avatar-preview').src = prevSrc;
                util.showToast(err.message, 'error');
            }
        };

        app.saveProfile = async () => {
            util.setLoading('btn-save-profile', true);
            try {
                const res = await api('/api/profile', {
                    method: 'PUT',
                    body: {
                        username: document.getElementById('edit-username').value.trim(),
                        display_name: document.getElementById('edit-display-name').value.trim(),
                        bio: document.getElementById('edit-bio').value.trim()
                    }
                });
                app.user = res.user;
                util.showToast('Profile updated', 'success');
                app.closeModal('profile-modal');
                app.renderNav();
                app.navigate('profile', app.user.username); 
            } catch (err) {
                util.showToast(err.message, 'error');
            } finally {
                util.setLoading('btn-save-profile', false, 'Done');
            }
        };

        // --- STARTUP ---
        document.addEventListener('DOMContentLoaded', app.init);

						</script>
</body>

</html>
